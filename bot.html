<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAJESTIC PHOENIX • AI бот</title>
    <style>
        :root {
            --phoenix-orange: #FF6B35;
            --phoenix-red: #EF476F;
            --phoenix-yellow: #FFD166;
            --phoenix-teal: #06D6A0;
            --phoenix-blue: #118AB2;
            --phoenix-dark: #073B4C;
            --gradient: linear-gradient(135deg, var(--phoenix-red), var(--phoenix-orange));
            --text-light: #F8F9FA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--phoenix-dark);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.1rem;
            padding: 8px 0;
            transition: 0.3s;
        }

        nav a.active {
            color: var(--phoenix-teal);
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .chat-header h2 {
            font-family: 'Cinzel', serif;
            color: var(--phoenix-yellow);
            font-size: 1.5rem;
        }

        .back-btn {
            background: var(--gradient);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .chat-messages {
            height: 450px;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
        }

        .user-message {
            background: var(--phoenix-blue);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-area {
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 20px;
            border-radius: 50px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--phoenix-teal);
        }

        .input-area button {
            background: var(--gradient);
            border: none;
            padding: 0 28px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            transform: scale(0.97);
        }

        footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .copyright {
            opacity: 0.6;
            font-size: 0.85rem;
            color: var(--text-light);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="logo">MAJESTIC PHOENIX</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="guide.html">Памятка</a></li>
                    <li><a href="Family.html">Семья</a></li>
                    <li><a href="help.html">Помощь</a></li>
                    <li><a href="about.html">Обо мне</a></li>
                    <li><a href="bot.html" class="active">🤖 AI бот</a></li>
                </ul>
            </nav>
        </header>

        <div class="chat-container">
            <div class="chat-header">
                <h2>⚖️ Юридический помощник LSCSD</h2>
                <a href="index.html" class="back-btn">← На главную</a>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    📜 <strong>Юридический помощник активен.</strong><br><br>
                    Напишите номер статьи, например: <strong>15.1 ч1</strong><br>
                    Или <strong>кратко</strong> — сокращу предыдущий ответ.
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="questionInput" placeholder="Вопрос по законам..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button id="sendBtn">Отправить</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="copyright">© 2025 MAJESTIC PHOENIX • Юридический помощник LSCSD</div>
    </footer>

    <script>
        // ===================== ТВОЙ API КЛЮЧ =====================
        const GROQ_API_KEY = "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";
        
        // ===================== БАЗА ЗАКОНОВ =====================
        const LAWS = `УК SA:
15.1 ч1 — Превышение должностных полномочий — 4 года лишения свободы или штраф 40.000-100.000$
15.6 ч1 — Халатность — 4 года лишения свободы или штраф 40.000-70.000$
13.1 — Культивация конопли — 3 года лишения свободы или штраф 20.000-40.000$

ДК SA:
37 п.в — Остановка на мосту запрещена — штраф до 5.000$ + эвакуация

ПК SA:
29 ч.7 — Реакция служебной собаки = основание для личного обыска`;

        let lastResponse = "";
        let isWaiting = false;

        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
            msgDiv.innerText = text;
            const container = document.getElementById('chatMessages');
            container.appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        async function askGroq(question) {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        { role: "system", content: `Ты — помощник по законам. Отвечай строго по этому тексту: ${LAWS}. Если не знаешь — скажи "не нашёл".` },
                        { role: "user", content: question }
                    ],
                    temperature: 0.3,
                    max_tokens: 500
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Ошибка ${response.status}: ${errorText.substring(0, 100)}`);
            }
            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function sendMessage() {
            if (isWaiting) return;
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, true);
            input.value = '';
            isWaiting = true;

            const isShorten = /кратко|сократи/i.test(question);
            
            if (isShorten && lastResponse) {
                addMessage('⏳ Сокращаю...');
                try {
                    const shortResponse = await askGroq(`Сократи до 2-3 предложений: ${lastResponse}`);
                    const msgs = document.getElementById('chatMessages');
                    msgs.removeChild(msgs.lastChild);
                    addMessage(shortResponse);
                } catch (e) {
                    const msgs = document.getElementById('chatMessages');
                    if (msgs.lastChild.innerText.includes('⏳')) msgs.removeChild(msgs.lastChild);
                    addMessage(`❌ ${e.message}`);
                }
                isWaiting = false;
                return;
            }

            addMessage('⏳ Думаю...');
            try {
                const reply = await askGroq(question);
                lastResponse = reply;
                const msgs = document.getElementById('chatMessages');
                msgs.removeChild(msgs.lastChild);
                addMessage(reply);
            } catch (e) {
                const msgs = document.getElementById('chatMessages');
                if (msgs.lastChild.innerText.includes('⏳')) msgs.removeChild(msgs.lastChild);
                addMessage(`❌ ${e.message}`);
            } finally {
                isWaiting = false;
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('questionInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
    </script>
</body>
  </html>
